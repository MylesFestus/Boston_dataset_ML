# ─────────────────────────────────────────────
# Auto-deploy to Heroku on every push to main
# ─────────────────────────────────────────────
name: Deploy to Heroku

on:
  push:
    branches: [ main ]   # triggers on every push to main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Pull the latest code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Deploy to Heroku using the deploy action
      - name: Deploy to Heroku
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}
          heroku_app_name: "bostonhousingapp"
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          buildpack: "https://github.com/heroku/heroku-buildpack-python"
          procfile: "Procfile"
          deployment_branch: "main"